name: rustmail

services:
  rustmail:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    security_opt:
      - no-new-privileges:true
    volumes:
      - rustmail-data:/data
    environment:
      RUSTMAIL_LOG_LEVEL: info
    restart: unless-stopped

volumes:
  rustmail-data:
