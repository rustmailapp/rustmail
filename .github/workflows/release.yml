name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  GHCR_IMAGE: ghcr.io/rustmailapp/rustmail
  DOCKERHUB_IMAGE: smyile/rustmail

permissions:
  contents: read

jobs:
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable

      - name: Build UI
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Upload UI dist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ui-dist
          path: ui/dist

  build-binaries:
    name: Build (${{ matrix.target }})
    needs: build-ui
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: armv7-unknown-linux-musleabihf
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download UI dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: ui-dist
          path: ui/dist

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: ${{ !matrix.cross }}
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        env:
          CROSS_SHA256: 642375d1bcf3bd88272c32ba90e999f3d983050adf45e66bd2d3887e8e838bad
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz \
            -o /tmp/cross.tar.gz
          echo "${CROSS_SHA256}  /tmp/cross.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin -f /tmp/cross.tar.gz
          rm /tmp/cross.tar.gz

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: rustmail-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/rustmail

  docker:
    name: Docker
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Linux musl binaries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: rustmail-*-linux-musl*
          path: artifacts

      - name: Prepare Docker context
        run: |
          mkdir -p docker/linux/amd64 docker/linux/arm64 docker/linux/arm/v7
          cp artifacts/rustmail-x86_64-unknown-linux-musl/rustmail docker/linux/amd64/rustmail
          cp artifacts/rustmail-aarch64-unknown-linux-musl/rustmail docker/linux/arm64/rustmail
          cp artifacts/rustmail-armv7-unknown-linux-musleabihf/rustmail docker/linux/arm/v7/rustmail
          chmod +x docker/linux/amd64/rustmail docker/linux/arm64/rustmail docker/linux/arm/v7/rustmail

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        id: dockerhub-login
        continue-on-error: true
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${{ env.GHCR_IMAGE }}:latest,${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.version }}"
          if [ "${{ steps.dockerhub-login.outcome }}" = "success" ]; then
            TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:latest,${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.version }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: docker/
          file: docker/Dockerfile.ci
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.tags.outputs.tags }}

  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: rustmail-*
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/rustmail-*/; do
            target=$(basename "$dir" | sed 's/^rustmail-//')
            chmod +x "$dir/rustmail"
            tar -czf "release/rustmail-${target}.tar.gz" -C "$dir" rustmail
          done

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-v:refname -l 'v*' | sed -n '2p')
          if [ -z "$PREV" ]; then
            PREV=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.prev_tag.outputs.tag }}"
          CURRENT="${{ github.ref_name }}"

          BODY=""

          FEATS=$(git log "$PREV".."$CURRENT" --pretty=format:"%s" | grep -E "^feat(\(.+\))?:" | sed -E 's/^feat(\([^)]*\))?: //' || true)
          if [ -n "$FEATS" ]; then
            BODY="${BODY}## New Features\n"
            while IFS= read -r line; do
              BODY="${BODY}- ${line}\n"
            done <<< "$FEATS"
            BODY="${BODY}\n"
          fi

          FIXES=$(git log "$PREV".."$CURRENT" --pretty=format:"%s" | grep -E "^fix(\(.+\))?:" | sed -E 's/^fix(\([^)]*\))?: //' || true)
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n"
            while IFS= read -r line; do
              BODY="${BODY}- ${line}\n"
            done <<< "$FIXES"
            BODY="${BODY}\n"
          fi

          PERF=$(git log "$PREV".."$CURRENT" --pretty=format:"%s" | grep -E "^perf(\(.+\))?:" | sed -E 's/^perf(\([^)]*\))?: //' || true)
          if [ -n "$PERF" ]; then
            BODY="${BODY}## Performance\n"
            while IFS= read -r line; do
              BODY="${BODY}- ${line}\n"
            done <<< "$PERF"
            BODY="${BODY}\n"
          fi

          CHORES=$(git log "$PREV".."$CURRENT" --pretty=format:"%s" | grep -E "^(chore|refactor|style|ci|docs|build)(\(.+\))?:" | sed -E 's/^[a-z]+(\([^)]*\))?: //' || true)
          if [ -n "$CHORES" ]; then
            BODY="${BODY}## Other Changes\n"
            while IFS= read -r line; do
              BODY="${BODY}- ${line}\n"
            done <<< "$CHORES"
            BODY="${BODY}\n"
          fi

          if [ -z "$BODY" ]; then
            BODY="No categorized changes in this release."
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo -e "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        run: printenv RELEASE_BODY > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file /tmp/release-notes.md \
            release/rustmail-*

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs and compute SHAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p assets

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "v${VERSION}" \
              --repo rustmailapp/rustmail \
              --pattern "rustmail-${target}.tar.gz" \
              --dir assets
            SHA=$(sha256sum "assets/rustmail-${target}.tar.gz" | awk '{print $1}')
            echo "SHA_${target//-/_}=${SHA}" >> "$GITHUB_ENV"
          done

      - name: Checkout homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: rustmailapp/homebrew-rustmail
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > Formula/rustmail.rb << 'FORMULA'
          class Rustmail < Formula
            desc "Self-hosted SMTP mail catcher with web UI, REST API, and CI assertions"
            homepage "https://github.com/rustmailapp/rustmail"
            version "__VERSION__"
            license "MIT OR Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/rustmailapp/rustmail/releases/download/v__VERSION__/rustmail-aarch64-apple-darwin.tar.gz"
                sha256 "__SHA_AARCH64_APPLE__"
              end
              on_intel do
                url "https://github.com/rustmailapp/rustmail/releases/download/v__VERSION__/rustmail-x86_64-apple-darwin.tar.gz"
                sha256 "__SHA_X86_64_APPLE__"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/rustmailapp/rustmail/releases/download/v__VERSION__/rustmail-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA_AARCH64_LINUX__"
              end
              on_intel do
                url "https://github.com/rustmailapp/rustmail/releases/download/v__VERSION__/rustmail-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA_X86_64_LINUX__"
              end
            end

            def install
              bin.install "rustmail"
              (var/"rustmail").mkpath
            end

            service do
              run [opt_bin/"rustmail", "serve"]
              keep_alive true
              working_dir var/"rustmail"
              log_path var/"log/rustmail.log"
              error_log_path var/"log/rustmail.log"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/rustmail --version")
            end
          end
          FORMULA
          sed -i "s/__VERSION__/${VERSION}/g" Formula/rustmail.rb
          sed -i "s/__SHA_AARCH64_APPLE__/${SHA_aarch64_apple_darwin}/g" Formula/rustmail.rb
          sed -i "s/__SHA_X86_64_APPLE__/${SHA_x86_64_apple_darwin}/g" Formula/rustmail.rb
          sed -i "s/__SHA_AARCH64_LINUX__/${SHA_aarch64_unknown_linux_gnu}/g" Formula/rustmail.rb
          sed -i "s/__SHA_X86_64_LINUX__/${SHA_x86_64_unknown_linux_gnu}/g" Formula/rustmail.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rustmail.rb
          git commit -m "rustmail ${VERSION}"
          git push

  update-aur:
    name: Update AUR Package
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs and compute SHAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p assets

          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            gh release download "v${VERSION}" \
              --repo rustmailapp/rustmail \
              --pattern "rustmail-${target}.tar.gz" \
              --dir assets
            SHA=$(sha256sum "assets/rustmail-${target}.tar.gz" | awk '{print $1}')
            echo "SHA_${target//-/_}=${SHA}" >> "$GITHUB_ENV"
          done

      - name: Checkout AUR repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: rustmailapp/aur-rustmail
          token: ${{ secrets.AUR_REPO_TOKEN }}

      - name: Update PKGBUILD
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > PKGBUILD << 'PKGBUILD_EOF'
          # Maintainer: RustMail <hello@rustmail.app>
          pkgname=rustmail-bin
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="Self-hosted SMTP mail catcher with web UI, REST API, and CI assertions"
          arch=('x86_64' 'aarch64')
          url="https://github.com/rustmailapp/rustmail"
          license=('MIT' 'Apache-2.0')
          provides=('rustmail')
          conflicts=('rustmail')
          depends=('glibc')

          source_x86_64=("${url}/releases/download/v${pkgver}/rustmail-x86_64-unknown-linux-gnu.tar.gz")
          source_aarch64=("${url}/releases/download/v${pkgver}/rustmail-aarch64-unknown-linux-gnu.tar.gz")

          sha256sums_x86_64=('__SHA_X86_64__')
          sha256sums_aarch64=('__SHA_AARCH64__')

          package() {
            install -Dm755 rustmail "${pkgdir}/usr/bin/rustmail"
          }
          PKGBUILD_EOF
          sed -i "s/__VERSION__/${VERSION}/g" PKGBUILD
          sed -i "s/__SHA_X86_64__/${SHA_x86_64_unknown_linux_gnu}/g" PKGBUILD
          sed -i "s/__SHA_AARCH64__/${SHA_aarch64_unknown_linux_gnu}/g" PKGBUILD

      - name: Update .SRCINFO
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > .SRCINFO << SRCINFO_EOF
          pkgbase = rustmail-bin
          	pkgdesc = Self-hosted SMTP mail catcher with web UI, REST API, and CI assertions
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/rustmailapp/rustmail
          	arch = x86_64
          	arch = aarch64
          	license = MIT
          	license = Apache-2.0
          	depends = glibc
          	provides = rustmail
          	conflicts = rustmail
          	source_x86_64 = https://github.com/rustmailapp/rustmail/releases/download/v${VERSION}/rustmail-x86_64-unknown-linux-gnu.tar.gz
          	sha256sums_x86_64 = ${SHA_x86_64_unknown_linux_gnu}
          	source_aarch64 = https://github.com/rustmailapp/rustmail/releases/download/v${VERSION}/rustmail-aarch64-unknown-linux-gnu.tar.gz
          	sha256sums_aarch64 = ${SHA_aarch64_unknown_linux_gnu}

          pkgname = rustmail-bin
          SRCINFO_EOF

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "rustmail ${VERSION}"
          git push
