name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable

      - name: Build UI
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (no-default-features)
        run: cargo clippy -p rustmail-server --no-default-features -- -D warnings

      - name: Tests
        run: cargo test --all

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: ui
        run: pnpm exec tsc -b

      - name: Build
        working-directory: ui
        run: pnpm build
