name: Bug Report
description: Report a bug in RustMail
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start RustMail with `...`
        2. Send email via `...`
        3. Open UI / call API `...`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: RustMail version
      description: Output of `rustmail --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Ubuntu / Debian
        - Fedora / RHEL
        - Arch Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - x86_64
        - aarch64 (ARM64)
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Homebrew
        - Docker
        - Pre-built binary
        - From source
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `--log-level=debug` and paste relevant output.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the problem.
